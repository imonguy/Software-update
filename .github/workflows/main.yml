name: FOTA Modern Auto Check
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with: {python-version: '3.9'}
      - name: Install
        run: pip install httpx
      - name: Capture
        run: python checker.py
      - name: Update Repo
        run: |
          git config --global user.name 'OneUI-Bot'
          git config --global user.email 'bot@fota.com'
          git add data.json
          git commit -m "Capture latest firmware [skip ci]" || exit 0
          git push

