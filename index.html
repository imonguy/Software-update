<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung FOTA One UI Tracker</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; padding: 20px; max-width: 800px; margin: auto; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .name { font-size: 1.2rem; font-weight: bold; color: #007aff; }
        .version { font-family: monospace; color: #00ff88; background: #000; padding: 10px; border-radius: 8px; margin: 10px 0; word-break: break-all; }
        .meta { font-size: 0.8rem; color: #666; }
        h1 { text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>
    <h1>Samsung Global FOTA</h1>
    <div id="app">Đang tải dữ liệu từ máy chủ FUS...</div>

    <script>
        async function load() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const data = await r.json();
                document.getElementById('app').innerHTML = data.map(d => `
                    <div class="card">
                        <div class="name">${d.name} (${d.model}/${d.csc})</div>
                        <div class="version">${d.version}</div>
                        <div class="meta">Cập nhật cuối: ${d.time}</div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('app').innerText = "Vui lòng đợi GitHub cập nhật dữ liệu...";
            }
        }
        load();
    </script>
</body>
</html>
